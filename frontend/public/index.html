<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B0F19" />
    <meta
      name="description"
      content="MovieVerse - Discover Amazing Movies"
    />
    <title>MovieVerse</title>
    <style>
    
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        background: #0B0F19;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.8s ease;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      
      .loading-logo-text {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #8B5CF6, #A855F7, #7C3AED);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 3px solid rgba(139, 92, 246, 0.1);
        border-top-color: #8B5CF6;
        animation: spin 0.8s linear infinite;
      }
      
      .loading-text {
        color: #94A3B8;
        font-size: 16px;
        animation: fadeInOut 1.5s ease-in-out infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      @media (max-width: 768px) {
        .loading-logo-text { font-size: 32px; }
        .loading-spinner { width: 48px; height: 48px; }
      }
      
      @media (max-width: 480px) {
        .loading-logo-text { font-size: 24px; }
        .loading-spinner { width: 40px; height: 40px; }
      }
    </style>
  </head>
  <body>
  
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-logo-text">MovieVerse</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading amazing movies...</div>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Hide loading screen when React is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
          }
        }, 1500);
      });
    </script>
  </body>
</html>
